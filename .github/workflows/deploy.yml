name: Deploy Offstyles Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 168.138.64.57 >> ~/.ssh/known_hosts

      - name: Run deploy script on server
        run: |
          ssh ubuntu@168.138.64.57 '/usr/local/bin/deploy-offstyles.sh'
